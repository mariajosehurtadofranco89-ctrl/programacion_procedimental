<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../mod_contabilidad/contabilidad.css">
    <title>Document</title>

<body>
    <div class="field">

        <label class="label">Fecha</label>
        <div class="control">

    <div class="field">
        <label class="label">Ingresos</label>
        <div class="control">
            <input class="input" type="text" placeholder="$00.00" id="Ingresos">
        </div>
    </div>



    <div class="field">
        <label class="label">Egresos</label>
        <div class="control">
            <input class="input" type="text" placeholder="$00.00" id="Egresos">

        <div class="control">
            <input class="input" type="text" placeholder="$00.00" id="Valor">
        </div>
    </div>


    <div class="field">
        <label class="label">Concepto</label>
        <div class="control">
            <input class="textarea" type="textarea"  id="Concepto">
        </div>

    <div class="field is-grouped">
        <div class="control">
            <button class="button is-link" id="btnguardar">Guardar</button>
